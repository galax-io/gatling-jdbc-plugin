name: Continuous Integration

# Test-only. Releases are tag-driven and live in release.yml.
on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JVM_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  test:
    name: Lint, Compile & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java (Temurin 17) with sbt cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache Coursier
        uses: coursier/cache-action@v6
      - name: Cache Ivy/SBT
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-
      - name: Check Formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck
      - name: Compile
        run: sbt clean compile
      - name: Tests (including Gatling JDBC example on H2)
        run: sbt coverage "Gatling / testOnly org.galaxio.performance.jdbc.test.DebugTest" test coverageReport coverageOff
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
