name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  JVM_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  format:
    name: Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Check Formatting
        run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin ${{ matrix.java }})
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-java${{ matrix.java }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-java${{ matrix.java }}-

      - name: Compile
        run: sbt compile

      - name: Unit Tests with Coverage
        run: sbt coverage test coverageReport coverageOff

      - name: Gatling Simulation (H2)
        run: sbt "Gatling / testOnly org.galaxio.performance.jdbc.test.DebugTest"

      - name: Upload coverage reports to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-java21-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-java21-

      - name: Integration Tests (Testcontainers)
        run: sbt "Test / testOnly -- -n org.galaxio.gatling.jdbc.tags.DockerTest"

  release:
    name: Release (tag-driven)
    needs: [format, test, integration]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Cache Coursier
        uses: coursier/cache-action@v8

      - name: Cache Ivy/SBT
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ runner.os }}-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/**') }}
          restore-keys: sbt-${{ runner.os }}-

      - name: Compute next version & create tag on main
        id: bump
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force --prune

          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" --first-parent 2>/dev/null || echo "")
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          RANGE="${LAST_TAG:+${LAST_TAG}..HEAD}"

          BUMP="patch"
          COMMITS=$(git log --pretty=format:%s ${RANGE})
          if echo "$COMMITS" | grep -Eiq 'BREAKING CHANGE|!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -Eiq '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          if [ -z "$LAST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          if git rev-parse -q --verify "refs/tags/${NEXT_TAG}" >/dev/null; then
            TAG_COMMIT=$(git rev-list -n 1 "${NEXT_TAG}")
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "${TAG_COMMIT}" = "${HEAD_COMMIT}" ]; then
              SKIP_TAG_CREATE=1
            else
              while git rev-parse -q --verify "refs/tags/${NEXT_TAG}" >/dev/null; do
                IFS='.' read -r MAJOR MINOR PATCH <<< "${NEXT_TAG#v}"
                PATCH=$((PATCH+1))
                NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
              done
            fi
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          if [ "${SKIP_TAG_CREATE:-0}" != "1" ]; then
            git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
            git push origin "$NEXT_TAG"
          fi

      - name: Publish to Sonatype via sbt-ci-release
        if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && steps.bump.outputs.tag)
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="${{ steps.bump.outputs.tag }}"
            export GITHUB_REF="refs/tags/${TAG}"
            export GITHUB_REF_NAME="${TAG}"
          fi

          VERSION="${TAG#v}"
          echo "Publishing version $VERSION (tag $TAG)"

          if [ -n "${PGP_SECRET:-}" ]; then
            echo "$PGP_SECRET" | base64 --decode | gpg --batch --import
          fi

          if sbt 'show dynver' >/dev/null 2>&1; then
            sbt ci-release
          else
            sbt "set ThisBuild/version := \"${VERSION}\"" ci-release
          fi

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && steps.bump.outputs.tag)
        with:
          mode: "COMMIT"
          fromTag: ${{ github.ref == 'refs/heads/main' && steps.bump.outputs.last_tag || '' }}
          toTag:   ${{ github.ref == 'refs/heads/main' && steps.bump.outputs.tag || '' }}
          configuration: ".github/changelog/release-changelog-builder.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && steps.bump.outputs.tag)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && steps.bump.outputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
